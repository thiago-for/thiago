<!DOCTYPE html>
  <html lang="PT-BR">
      <head>
      <style>
      .texto{
        color: red; 
      } 
      .campo{
        border:1px solid red;
      }
      fieldset{ 
        border:1px solid red;
        background-color:#9932CC;
      }
      legend{ 
        color: white;
      } 
      .botao{
        background-color: green; color: white; 
      } 
      body{ 
        background-color: pink;
      } 
      </style>
        <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAf-Qv0Rkm2_FRZGTeclJzyF2AMLwq8jIE",
  authDomain: "thiago3c.firebaseapp.com",
  projectId: "thiago3c",
  storageBucket: "thiago3c.firebasestorage.app",
  messagingSenderId: "679415618070",
  appId: "1:679415618070:web:6a59c6b59d36aedde0f337"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById("formUsuario");
    const mensagem = document.getElementById("mensagem");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const cpf = document.getElementById("cpf").value;
      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;
      const telefone = document.getElementById("telefone").value;
      const senha = document.getElementById("senha").value;

      try {
        await addDoc(collection(db, "usuarios"), {
          cpf,
          nome,
          email,
          telefone,
          senha
        });

        mensagem.textContent = "Usuário salvo com sucesso.";
        mensagem.style.color = "green";
        form.reset();
      } catch (error) {
        mensagem.textContent = "Erro ao salvar: " + error.message;
        mensagem.style.color = "red";
      }
    });
  </script>
      </head>
      <body>
        <form method="POST" action="">
               <fieldset>
                    <legend>CADASTRO DE USUARIOS</legend>
                    <p class="texto">NOME COMPLETO:</p> <input type="text"  class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">CEP:</p> <input type="text" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">CPF:</p> <input type="text" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">DATA DE NASCIMENTO:</p> <input type="text" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">EMAIL:</p> <input type="text" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">FOTO:</p> <input type="text" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">IDADE:</p> <input type="text" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">RG:</p> <input type="text" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">SENHA:</p> <input type="text" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">TELEFONE:</p> <input type="text" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <input type="submit" values="Cadastrar">
               </fieldset>
        </form>
      </body>
    </html>
